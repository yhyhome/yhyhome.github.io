<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鱼航员之家</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            border: 1px solid #000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 1400px;
            height: 700px;
            border: 3px solid #000;
            display: flex;
            flex-direction: column;
            background: white;
            position: relative;
        }

        .header {
            height: 50px;
            border-bottom: 2px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: bold;
            color: #000;
        }

        .main-content {
            flex: 1;
            display: flex;
        }

        /* 左侧区域 */
        .left-section {
            width: 300px;
            border-right: 2px solid #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            position: relative;
            height: 100%;
        }

        .left-section .title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .left-section .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .left-section button {
            width: 120px;
            height: 40px;
            border: 2px solid #000;
            background: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .left-section button:hover {
            background: #f0f0f0;
        }

        .left-section button.active {
            background: #000;
            color: white;
        }

        .left-section .footer {
            margin-top: auto;
            text-align: center;
            width: 100%;
            padding-bottom: 20px;
        }

        .left-section .footer .mascot-image {
            width: 200px;
            height: auto;
            object-fit: contain;
        }

        /* 主页面 */
        .home-section {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
        }

        .home-section .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .home-section .main-menu {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
        }

        .home-section .main-menu button {
            width: 100%;
            padding: 20px;
            border: 2px solid #000;
            background: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .home-section .main-menu button:hover {
            background: #000;
            color: white;
        }

        /* 发帖页面 - 独立全屏 */
        .create-page {
            display: none;
            width: 100%;
            height: 100%;
            padding: 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: white;
        }

        .create-page.active {
            display: flex;
        }

        .create-page .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .create-page .form-container {
            width: 500px;
            max-width: 100%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #000;
            font-size: 14px;
            font-family: inherit;
            background: white;
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
        }

        .create-page .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .create-page button {
            padding: 12px 30px;
            border: 2px solid #000;
            background: white;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .create-page button:hover {
            background: #f0f0f0;
        }

        /* 看帖页面 - 独立全屏 */
        .view-page {
            display: none;
            width: 100%;
            height: 100%;
            padding: 30px;
            flex-direction: column;
            background: white;
        }

        .view-page.active {
            display: flex;
        }

        .view-page .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .view-page .post-list {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .post-item {
            border: 2px solid #000;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .post-item:hover {
            background: #f9f9f9;
        }

        .post-item .post-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #000;
        }

        .post-item .post-meta {
            font-size: 12px;
            color: #666;
        }

        .view-page .back-btn {
            align-self: flex-start;
            margin-bottom: 20px;
            padding: 10px 20px;
            border: 2px solid #000;
            background: white;
            cursor: pointer;
            font-size: 16px;
        }

        /* 管理页面 - 独立全屏 */
        .admin-page {
            display: none;
            width: 100%;
            height: 100%;
            padding: 30px;
            flex-direction: column;
            background: white;
        }

        .admin-page.active {
            display: flex;
        }

        .admin-page .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .admin-page .admin-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
        }

        .admin-page .admin-list {
            border: 2px solid #000;
            padding: 15px;
            overflow-y: auto;
        }

        .admin-page .admin-list h3 {
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #000;
        }

        .admin-page .post-item-mini {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 10px;
        }

        .admin-page .post-item-mini h4 {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .admin-page .post-item-mini p {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .admin-page .action-buttons {
            display: flex;
            gap: 10px;
        }

        .admin-page button {
            padding: 8px 15px;
            border: 2px solid #000;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }

        .admin-page button:hover {
            background: #f0f0f0;
        }

        .admin-page .back-btn {
            align-self: flex-start;
            margin-bottom: 20px;
            padding: 10px 20px;
            border: 2px solid #000;
            background: white;
            cursor: pointer;
            font-size: 16px;
        }

        /* 右侧区域 - 隐藏 */
        .right-section {
            display: none;
        }

        /* 状态标签 */
        .status-badge {
            display: inline-block;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: bold;
            border: 1px solid #000;
            margin-top: 5px;
        }

        .status-pending {
            background: #fffacd;
        }

        .status-approved {
            background: #90ee90;
        }

        .status-rejected {
            background: #ffcccb;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }

        /* 帖子详情弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border: 3px solid #000;
            width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
        }

        .modal-content h2 {
            margin-bottom: 15px;
            font-size: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 10px;
        }

        .modal-content .author {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }

        .modal-content .content {
            line-height: 1.8;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .modal-content .close-btn {
            width: 100px;
            padding: 10px;
            border: 2px solid #000;
            background: white;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div class="header">
            <h1>鱼航员之家</h1>
        </div>

        <div class="main-content">
            <!-- 左侧功能区 -->
            <div class="left-section" id="left-nav">
                <div class="title">鱼航员之家</div>
                <div class="buttons">
                    <button onclick="showHome()">首页</button>
                </div>
                <div class="footer">
                    <img src="https://www.coze.cn/s/iPtbQSatfg4/?width_height=1469x748" alt="虾形吉祥物" class="mascot-image">
                </div>
            </div>

            <!-- 中间主页面 -->
            <div class="home-section" id="home-section">
                <div class="section-title">选择功能</div>
                <div class="main-menu">
                    <button onclick="showPage('create')">📝 发帖</button>
                    <button onclick="showPage('view')">📖 看帖</button>
                </div>
            </div>

            <!-- 右侧帖子展示区 - 仅首页显示 -->
            <div class="right-section" id="right-section">
                <div class="section-title">帖子</div>
                <div class="posts-grid" id="posts-grid">
                    <!-- 帖子卡片 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 发帖页面 - 独立全屏 -->
    <div class="create-page" id="create-page">
        <div class="section-title">发帖</div>
        <div class="form-container">
            <div class="form-group">
                <label>发帖人：</label>
                <input type="text" id="post-author" placeholder="请输入昵称">
            </div>
            <div class="form-group">
                <label>标题：</label>
                <input type="text" id="post-title" placeholder="请输入标题">
            </div>
            <div class="form-group">
                <label>内容：</label>
                <textarea id="post-content" placeholder="请输入内容"></textarea>
            </div>
            <div class="button-group">
                <button onclick="createPost()">发布帖子</button>
                <button onclick="showHome()">返回首页</button>
            </div>
        </div>
    </div>

    <!-- 看帖页面 - 独立全屏 -->
    <div class="view-page" id="view-page">
        <button class="back-btn" onclick="showHome()">← 返回首页</button>
        <div class="section-title">帖子列表</div>
        <div class="post-list" id="view-post-list">
            <!-- 帖子列表 -->
        </div>
    </div>

    <!-- 管理页面 - 独立全屏 -->
    <div class="admin-page" id="admin-page">
        <button class="back-btn" onclick="showHome()">← 返回首页</button>
        <div class="section-title">管理后台</div>
        <div class="admin-container">
            <div class="admin-list">
                <h3>待审核帖子</h3>
                <div id="admin-pending-list">
                    <!-- 待审核列表 -->
                </div>
            </div>
            <div class="admin-list">
                <h3>已管理帖子</h3>
                <div id="admin-managed-list">
                    <!-- 已管理列表 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 帖子详情弹窗 -->
    <div class="modal" id="post-modal">
        <div class="modal-content">
            <h2 id="modal-title">帖子标题</h2>
            <div class="author" id="modal-author">作者 | 时间</div>
            <div class="content" id="modal-content">帖子内容</div>

            <button class="close-btn" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'yuhangyuan_bbs_posts';

        const MAX_POSTS_PER_WEEK = 7;
        let keyPressed = {};

        function getPosts() {
            const posts = localStorage.getItem(STORAGE_KEY);
            return posts ? JSON.parse(posts) : [];
        }

        function savePosts(posts) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleString('zh-CN');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 显示首页
        function showHome() {
            document.getElementById('main-container').style.display = 'flex';
            document.getElementById('create-page').classList.remove('active');
            document.getElementById('view-page').classList.remove('active');
            document.getElementById('admin-page').classList.remove('active');
        }

        // 显示独立页面
        function showPage(page) {
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('create-page').classList.remove('active');
            document.getElementById('view-page').classList.remove('active');
            document.getElementById('admin-page').classList.remove('active');

            if (page === 'create') {
                document.getElementById('create-page').classList.add('active');
            } else if (page === 'view') {
                document.getElementById('view-page').classList.add('active');
                renderPostList();
            } else if (page === 'admin') {
                document.getElementById('admin-page').classList.add('active');
                renderAdmin();
            }
        }

        function renderPosts() {
            const posts = getPosts();
            const approvedPosts = posts.filter(p => p.status === 'approved');
            const grid = document.getElementById('posts-grid');

            if (approvedPosts.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column: span 2;">暂无帖子</div>';
                return;
            }

            approvedPosts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            grid.innerHTML = approvedPosts.map(post => `
                <div class="post-card" onclick="openPost('${post.id}')">
                    <div class="post-title">${escapeHtml(post.title)}</div>
                    <div class="post-meta">
                        <div class="post-author">作者：${escapeHtml(post.author)}</div>
                        <div>${post.createdAt}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderPostList() {
            const posts = getPosts();
            const approvedPosts = posts.filter(p => p.status === 'approved');
            const list = document.getElementById('view-post-list');

            if (approvedPosts.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无帖子</div>';
                return;
            }

            approvedPosts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            list.innerHTML = approvedPosts.map(post => `
                <div class="post-item" onclick="openPost('${post.id}')">
                    <div class="post-title">${escapeHtml(post.title)}</div>
                    <div class="post-meta">
                        <div>作者：${escapeHtml(post.author)}</div>
                        <div>${post.createdAt}</div>
                    </div>
                </div>
            `).join('');
        }

        function createPost() {
            const author = document.getElementById('post-author').value.trim();
            const title = document.getElementById('post-title').value.trim();
            const content = document.getElementById('post-content').value.trim();

            if (!author || !title || !content) {
                alert('请填写完整信息！');
                return;
            }

            // 检查本周发帖数量
            const posts = getPosts();
            const now = new Date();
            const oneWeekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

            // 获取当前用户本周发帖数
            const userPostsThisWeek = posts.filter(post => {
                const postDate = new Date(post.createdAt);
                return post.author === author &&
                       postDate >= oneWeekAgo;
            });

            if (userPostsThisWeek.length >= MAX_POSTS_PER_WEEK) {
                alert(`本周发帖次数已达上限（每周最多${MAX_POSTS_PER_WEEK}帖），请下周再试！`);
                return;
            }

            const newPost = {
                id: generateId(),
                author: author,
                title: title,
                content: content,
                createdAt: getCurrentTime(),
                status: 'pending'
            };

            posts.push(newPost);
            savePosts(posts);

            // 清空表单
            document.getElementById('post-author').value = '';
            document.getElementById('post-title').value = '';
            document.getElementById('post-content').value = '';

            alert('帖子已提交，等待管理员审核！');
        }

        function openPost(postId) {
            const posts = getPosts();
            const post = posts.find(p => p.id === postId);

            if (!post) {
                alert('帖子不存在！');
                return;
            }

            document.getElementById('modal-title').textContent = post.title;
            document.getElementById('modal-author').textContent = `作者：${post.author} | 时间：${post.createdAt}`;
            document.getElementById('modal-content').innerHTML = escapeHtml(post.content).replace(/\n/g, '<br>');

            document.getElementById('post-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('post-modal').classList.remove('active');
        }

        function renderAdmin() {
            const posts = getPosts();
            const pendingPosts = posts.filter(p => p.status === 'pending');
            const managedPosts = posts.filter(p => p.status !== 'pending');

            // 渲染待审核列表
            const pendingList = document.getElementById('admin-pending-list');
            if (pendingPosts.length === 0) {
                pendingList.innerHTML = '<div class="empty-state">暂无待审核帖子</div>';
            } else {
                pendingList.innerHTML = pendingPosts.map(post => `
                    <div class="post-item-mini">
                        <h4>${escapeHtml(post.title)}</h4>
                        <p>${escapeHtml(post.author)} | ${post.createdAt}</p>
                        <p style="font-size: 11px;">${escapeHtml(post.content.substring(0, 80))}...</p>
                        <div class="action-buttons">
                            <button onclick="openPost('${post.id}')">查看</button>
                            <button onclick="approvePost('${post.id}')">通过</button>
                            <button onclick="rejectPost('${post.id}')">拒绝</button>
                        </div>
                    </div>
                `).join('');
            }

            // 渲染已管理列表
            const managedList = document.getElementById('admin-managed-list');
            if (managedPosts.length === 0) {
                managedList.innerHTML = '<div class="empty-state">暂无已管理帖子</div>';
            } else {
                managedList.innerHTML = managedPosts.map(post => `
                    <div class="post-item-mini">
                        <h4>
                            ${escapeHtml(post.title)}
                            <span class="status-badge status-${post.status}">${post.status === 'approved' ? '已通过' : '已拒绝'}</span>
                        </h4>
                        <p>${escapeHtml(post.author)} | ${post.createdAt}</p>
                        <div class="action-buttons">
                            <button onclick="openPost('${post.id}')">查看</button>
                            <button onclick="deletePost('${post.id}')">删除</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function approvePost(postId) {
            const posts = getPosts();
            const postIndex = posts.findIndex(p => p.id === postId);

            if (postIndex !== -1) {
                posts[postIndex].status = 'approved';
                savePosts(posts);
                renderAdmin();
                alert('审核通过！');
            }
        }

        function rejectPost(postId) {
            const posts = getPosts();
            const postIndex = posts.findIndex(p => p.id === postId);

            if (postIndex !== -1) {
                posts[postIndex].status = 'rejected';
                savePosts(posts);
                renderAdmin();
                alert('已拒绝！');
            }
        }

        function deletePost(postId) {
            if (!confirm('确认删除？')) return;

            let posts = getPosts();
            posts = posts.filter(p => p.id !== postId);
            savePosts(posts);
            renderAdmin();
        }

        // 键盘事件监听
        document.addEventListener('keydown', function(e) {
            keyPressed[e.key.toLowerCase()] = true;

            // 检查是否同时按下g和l键
            if (keyPressed['g'] && keyPressed['l']) {
                e.preventDefault();
                // 密码保护
                const password = prompt('请输入管理页面密码：');
                if (password === '20150321jcy_key') {
                    showPage('admin');
                } else if (password !== null) {
                    alert('密码错误，请重试！');
                }
            }
        });

        document.addEventListener('keyup', function(e) {
            keyPressed[e.key.toLowerCase()] = false;
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderPosts();
        });
    </script>
</body>
</html>
